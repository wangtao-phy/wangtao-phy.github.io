<!-- 完全自定义的侧边栏，脱离主题原有样式，强制水平居中 -->
<div class="my-custom-sidebar">
  <div class="my-sidebar-content">
    <!-- 头像 -->
    <div class="my-avatar">
      <img src="/assets/bp.jpeg" alt="Tao Wang" />
    </div>
    
    <!-- 名字（带超链接） -->
    <h1 class="my-name">
      <a href="{{ '/' | absolute_url }}">{{ site.title }}</a>
    </h1>
    
    <!-- 职称 -->
    <div class="my-title">Theoretical Physics Researcher</div>
    
    <!-- 导航菜单（从 _data/navigation.yml 读取） -->
    <nav class="my-nav">
      {% for item in site.data.navigation %}
        <a class="my-nav-item" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
    
    <!-- 访客计数器 -->
    <div style="text-align: center; font-size: 0.85rem; opacity: 0.7; margin-top: auto; padding-bottom: 1rem;">
      <span id="vercount_value_site_uv"></span> 位访客
    </div>
  </div>
</div>

<style>
  /* 强制覆盖所有可能的父级样式，确保侧边栏水平居中 */
  .my-custom-sidebar {
    position: relative !important;
    display: flex !important;
    justify-content: center !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    left: auto !important;
    right: auto !important;
    float: none !important;
    clear: both !important;
  }
  
  .my-sidebar-content {
    width: 260px !important;           /* 固定宽度，可根据需要调整 */
    text-align: center !important;
    margin: 2rem auto !important;      /* 上下留白，左右自动居中 */
    padding: 0 !important;
  }
  
  /* 头像样式 */
  .my-avatar img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    display: inline-block;
  }
  
  /* 名字样式 */
  .my-name {
    font-size: 1.5rem;
    margin: 0.75rem 0 0.25rem 0;
    font-weight: bold;
  }
  .my-name a {
    color: #e3e4e5;
    text-decoration: none;
  }
  .my-name a:hover {
    color: #2c7cb0;
    text-decoration: underline;
  }
  
  /* 职称样式 */
  .my-title {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-bottom: 1.25rem;
  }
  
  /* 导航菜单样式：垂直排列，每一项单独一行，居中 */
  .my-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 1rem 0;
  }
  .my-nav-item {
    display: block;
    padding: 0.3rem 0;
    color: #e3e4e5;
    text-decoration: none;
    transition: color 0.2s;
  }
  .my-nav-item:hover {
    color: #2c7cb0;
    text-decoration: underline;
  }
  
  /* 计数器样式 */
  .my-counter {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 1rem;
  }
</style>
