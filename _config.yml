# 引入 not-pure-poole 主题
plugins:
  - jekyll-remote-theme
remote_theme: vszhub/not-pure-poole

# 网站基本信息设置
title: Tao Wang (王涛)
url: "https://wangtao-phy.github.io" 

description: Theoretical Physics Researcher

# Jottings 集合设置
collections:
  jottings:
    output: true
    permalink: /jottings/:title/

# 为 Jottings 集合中的文件设置默认布局
defaults:
  - scope:
      type: "jottings"
    values:
      layout: "default"   # 使用 _layouts/jottings.html
      author: "Tao Wang"

markdown: kramdown
kramdown:
  math_engine: mathjax   # 你也可以把 mathjax 换成 katex
