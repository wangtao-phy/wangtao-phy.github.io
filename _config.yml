# 引入 not-pure-poole 主题
plugins:
  - jekyll-remote-theme
remote_theme: vszhub/not-pure-poole

# 网站基本信息设置
title: Tao Wang (王涛)
url: "https://wangtao-phy.github.io" 

# 核心修改：在个人简介中注入排序代码，实现头像在上、名字在下
description: >-
  <style>
    .sidebar-about h1 {
      margin-top: 15px !important;
      margin-bottom: 0 !important;
    }
  </style>
  <div style="text-align: center;">
    <img src="/assets/bp.jpeg" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.8); box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: inline-block;" />
    <div style="font-size: 0.95rem; opacity: 0.9; margin-top: 10px;">Theoretical Physics Researcher</div>
  </div>
  <script>
    setTimeout(function() {
      var container = document.querySelector('.sidebar-about');
      var nameNode = document.querySelector('.sidebar-about h1');
      if (container && nameNode) {
        container.appendChild(nameNode);
      }
    }, 100);
  </script>
