# 引入 not-pure-poole 主题
plugins:
  - jekyll-remote-theme
remote_theme: vszhub/not-pure-poole

# 网站基本信息设置
title: Tao Wang (王涛)
url: "https://wangtao-phy.github.io" 

# 核心修改：在个人简介中注入排序代码，实现头像在上、名字在下
description: >-
  <div id="my-avatar" style="text-align: center;">
    <img src="/assets/bp.jpeg" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.8); box-shadow: 0 4px 8px rgba(0,0,0,0.2);" />
    <div style="font-size: 0.95rem; opacity: 0.9; margin-top: 10px;">Theoretical Physics Researcher</div>
  </div>
  <script>
    (function() {
      function swap() {
        var avatar = document.getElementById('my-avatar');
        var nameElem = document.querySelector('.sidebar-about h1');
        if (avatar && nameElem && avatar.parentNode === nameElem.parentNode) {
          nameElem.parentNode.insertBefore(avatar, nameElem);
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', swap);
      } else {
        swap();
      }
    })();
  </script>
