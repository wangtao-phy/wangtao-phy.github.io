# 引入 not-pure-poole 主题
plugins:
  - jekyll-remote-theme
remote_theme: vszhub/not-pure-poole

# 网站基本信息设置
title: Tao Wang (王涛)
url: "https://wangtao-phy.github.io" 

description: >-
  <style>
    /* 精准定位并隐藏主题自带的标题 */
    .sidebar-title,
    .sidebar-about h1,
    .masthead-title {
      display: none !important;
    }

    /* 以下是你的自定义内容样式，确保居中 */
    .my-sidebar {
      text-align: center;
    }
    .my-sidebar img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: inline-block;
    }
    .my-name {
      margin-top: 15px;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .my-name a {
      color: inherit;
      text-decoration: none;
    }
    .my-title {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-top: 10px;
    }
  </style>
  <div class="my-sidebar">
    <img src="/assets/bp.jpeg" alt="Tao Wang">
    <div class="my-name">
      <a href="https://wangtao-phy.github.io">Tao Wang (王涛)</a>
    </div>
    <div class="my-title">Theoretical Physics Researcher</div>
  </div>
